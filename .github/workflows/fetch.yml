name: Fetch ApeWisdom Data

on:
  schedule:
    - cron: '0 5 * * *'      # 7h00 Paris (UTC+2 été)
    - cron: '0 13 * * *'     # 15h00 Paris
    - cron: '30 21 * * *'    # 23h30 Paris
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch data
        run: node scripts/fetch.js
      - name: Commit & push
        run: |
          git config user.name "ApeWisdom Bot"
          git config user.email "bot@apewisdom"
          git add data/history.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "snapshot: $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push)
